<div class="card-container" [routerLink]="['/card', card.id]">
  <div class="card-image-wrapper">
    <img
      [src]="card.images.small"
      [alt]="card.name"
      loading="lazy"
      class="card-image"
      (error)="onImageError($event)"
    />

    @if (isOwned$ | async) {
      <div class="owned-badge" pTooltip="Dans ma collection" tooltipPosition="top">
        <i class="pi pi-check"></i>
      </div>
    }
  </div>

  <div class="card-info">
    <span class="card-name">{{ card.name }}</span>
    <div class="card-meta">
      <span class="card-set">{{ card.set.name }}</span>
      @if (card.rarity) {
        <p-tag
          [value]="card.rarity"
          [severity]="getRarityColor(card.rarity)"
          styleClass="rarity-tag"
        />
      }
    </div>
  </div>
</div>
